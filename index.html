<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Fun!</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ==========================================================
     "Math Notebook" aesthetic — cream ruled paper, hand-lettered
     type, crayon-bright sticker buttons with flat ink shadows,
     margin doodles. Built for kids: high contrast, big tap
     targets, playful motion.
     ========================================================== */

  :root {
    --paper:       #fdf5e1;
    --paper-deep:  #f4e6bc;
    --rule:        #d7c899;
    --margin:      #e06b6b;
    --ink:         #2a251e;
    --ink-soft:    #6b6052;
    --red:         #e63946;
    --blue:        #1d6fda;
    --green:       #2ea866;
    --yellow:      #f4b82b;
    --orange:      #ef6f3a;
    --purple:      #9b59c8;
    --pink:        #ef78b3;
    --shadow-ink:  rgba(42, 37, 30, 0.9);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { min-height: 100%; }

  body {
    font-family: 'Fredoka', 'Segoe UI', system-ui, sans-serif;
    font-weight: 500;
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 14px;
    background-color: var(--paper);
    /* Ruled-paper background: horizontal lines + red margin line */
    background-image:
      repeating-linear-gradient(
        to bottom,
        transparent 0 31px,
        var(--rule) 31px 32px
      ),
      linear-gradient(
        to right,
        transparent 0 62px,
        var(--margin) 62px 63px,
        transparent 63px 100%
      );
    background-size: 100% 32px, 100% 100%;
    transition: background-color 0.4s;
    overflow-x: hidden;
  }

  /* Feedback body tints: gentle paper washes, not full-screen flashes */
  body.theme-correct { background-color: #e6f5d9; }
  body.theme-wrong   { background-color: #fbe1e0; }

  /* Scattered SVG doodles in the page margins (non-interactive) */
  body::before, body::after {
    content: '';
    position: fixed;
    width: 180px;
    height: 180px;
    pointer-events: none;
    opacity: 0.55;
    background-repeat: no-repeat;
    background-size: contain;
    z-index: 0;
  }
  body::before {
    top: 24px; left: 24px;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 120'><g fill='none' stroke='%231d6fda' stroke-width='3.2' stroke-linecap='round' stroke-linejoin='round'><path d='M10 95 Q30 70 50 88 T90 82'/><path d='M20 20 l6 6 M26 20 l-6 6'/><circle cx='92' cy='32' r='10'/><path d='M82 12 l4 8 l8 2 l-6 6 l2 8 l-8-4 l-8 4 l2-8 l-6-6 l8-2z' fill='%23f4b82b' stroke='%23a7801a'/></g></svg>");
    transform: rotate(-8deg);
  }
  body::after {
    bottom: 24px; right: 24px;
    width: 200px; height: 200px;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 120'><g fill='none' stroke='%23e63946' stroke-width='3.2' stroke-linecap='round' stroke-linejoin='round'><path d='M10 60 Q30 40 50 60 T90 60' stroke='%239b59c8'/><path d='M95 18 v20 M85 28 h20' stroke='%232ea866'/><path d='M14 102 l6-20 l6 20' /><path d='M50 100 c10-20 30-20 40 0' stroke='%23ef6f3a'/><circle cx='100' cy='95' r='6' fill='%23f4b82b' stroke='%23a7801a'/></g></svg>");
    transform: rotate(6deg);
  }

  /* ---------- Card: the "page" ---------- */
  .card {
    position: relative;
    background: #fffef7;
    border: 2.5px solid var(--ink);
    border-radius: 6px;
    padding: 36px 40px 32px;
    max-width: 540px;
    width: 100%;
    text-align: center;
    z-index: 1;
    /* Chunky ink shadow for a sticker-on-paper feel */
    box-shadow:
      6px 7px 0 var(--shadow-ink),
      0 14px 40px rgba(0,0,0,0.12);
    /* Faint ruled lines inside the card so it still reads as paper */
    background-image:
      repeating-linear-gradient(
        to bottom,
        transparent 0 28px,
        rgba(199, 180, 130, 0.35) 28px 29px
      );
  }
  /* A tiny piece of "washi tape" at the top */
  .card::before {
    content: '';
    position: absolute;
    top: -14px;
    left: 50%;
    transform: translateX(-50%) rotate(-2deg);
    width: 110px;
    height: 22px;
    background: repeating-linear-gradient(
      45deg,
      #f4b82b 0 8px,
      #ef6f3a 8px 16px
    );
    border: 1.5px solid var(--ink);
    border-radius: 2px;
    box-shadow: 2px 2px 0 var(--shadow-ink);
    opacity: 0.95;
  }

  body.theme-correct .card { animation: wobble 0.55s ease; }
  body.theme-wrong   .card { animation: shake 0.45s ease; }
  @keyframes wobble {
    0%, 100% { transform: rotate(0); }
    25%      { transform: rotate(-1.4deg) translateY(-3px); }
    50%      { transform: rotate(1.4deg); }
    75%      { transform: rotate(-0.6deg); }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%      { transform: translateX(-8px); }
    40%      { transform: translateX(8px); }
    60%      { transform: translateX(-5px); }
    80%      { transform: translateX(5px); }
  }

  /* ---------- Typography ---------- */
  h1 {
    font-family: 'Patrick Hand', 'Fredoka', cursive;
    font-weight: 400;
    font-size: 2.6rem;
    color: var(--ink);
    margin-bottom: 18px;
    line-height: 1.1;
    letter-spacing: 0.5px;
  }
  /* Hand-drawn underline under h1 on lang / mode / results screens */
  .lang-screen h1, .mode-screen h1, .challenge-setup h1, .results-screen h1 {
    position: relative;
    display: inline-block;
    margin-bottom: 28px;
    padding-bottom: 6px;
  }
  .lang-screen h1::after, .mode-screen h1::after,
  .challenge-setup h1::after, .results-screen h1::after {
    content: '';
    position: absolute;
    left: -6%; right: -6%;
    bottom: -4px; height: 10px;
    background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 10' preserveAspectRatio='none'><path d='M2 7 Q50 1 100 6 T198 4' fill='none' stroke='%23e63946' stroke-width='3.2' stroke-linecap='round'/></svg>") center/100% 100% no-repeat;
  }

  /* ---------- Screens base ---------- */
  .lang-screen, .mode-screen, .challenge-setup, .results-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .game-screen { display: none; }

  /* ---------- Sticker buttons (mode + language picker) ---------- */
  .lang-options {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 16px 14px;
    width: 100%;
    padding: 4px;
  }
  .lang-btn {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 14px 10px 12px;
    border: 2.5px solid var(--ink);
    border-radius: 14px;
    background: #fffef7;
    cursor: pointer;
    font-family: 'Fredoka', sans-serif;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    box-shadow: 4px 4px 0 var(--shadow-ink);
  }
  /* Rotate each button a touch differently so they feel hand-placed */
  .lang-options .lang-btn:nth-child(6n+1) { transform: rotate(-1.4deg); background: #fffbe8; }
  .lang-options .lang-btn:nth-child(6n+2) { transform: rotate(1.2deg);  background: #e8f2ff; }
  .lang-options .lang-btn:nth-child(6n+3) { transform: rotate(-0.8deg); background: #eaf8e0; }
  .lang-options .lang-btn:nth-child(6n+4) { transform: rotate(1.6deg);  background: #fdeada; }
  .lang-options .lang-btn:nth-child(6n+5) { transform: rotate(-1.1deg); background: #fbe0ee; }
  .lang-options .lang-btn:nth-child(6n)   { transform: rotate(0.9deg);  background: #efe2fb; }
  .lang-btn:hover {
    transform: translate(-2px, -2px) rotate(0);
    box-shadow: 6px 6px 0 var(--shadow-ink);
  }
  .lang-btn:active {
    transform: translate(2px, 2px);
    box-shadow: 1px 1px 0 var(--shadow-ink);
  }
  .lang-flag {
    font-size: 32px;
    line-height: 1;
    filter: drop-shadow(1px 1px 0 rgba(0,0,0,0.12));
  }
  .lang-name {
    font-family: 'Patrick Hand', cursive;
    font-size: 1.3rem;
    color: var(--ink);
  }

  /* ---------- Score bar ---------- */
  .score-bar {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 6px 18px;
    margin-bottom: 20px;
    font-family: 'Patrick Hand', cursive;
    font-size: 1.25rem;
    color: var(--ink-soft);
  }
  .score-bar > span { white-space: nowrap; }
  .score-bar .total,
  .score-bar .correct,
  .score-bar .wrong,
  .score-bar .streak { font-weight: 400; font-size: 1.4rem; }
  .score-bar .total   { color: var(--blue); }
  .score-bar .correct { color: var(--green); }
  .score-bar .wrong   { color: var(--red); }
  .score-bar .streak  { color: var(--orange); }

  /* ---------- Pill selectors (difficulty / timer) ---------- */
  .mode-selector {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .mode-btn {
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    padding: 7px 18px;
    border: 2.2px solid var(--ink);
    border-radius: 999px;
    background: #fffef7;
    color: var(--ink);
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: 2px 2px 0 var(--shadow-ink);
  }
  .mode-btn:hover  { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 var(--shadow-ink); }
  .mode-btn:active { transform: translate(1px,1px);   box-shadow: 1px 1px 0 var(--shadow-ink); }
  .mode-btn.active {
    background: var(--yellow);
    color: var(--ink);
    transform: rotate(-1deg);
  }

  /* ---------- Operation toggles ---------- */
  .settings-row {
    margin-top: 14px;
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .op-btn {
    font-family: 'Patrick Hand', cursive;
    padding: 4px 18px;
    border: 2.2px solid var(--ink);
    border-radius: 12px;
    background: #fffef7;
    color: var(--ink);
    font-size: 1.5rem;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: 2px 2px 0 var(--shadow-ink);
    min-width: 52px;
  }
  .op-btn:hover  { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 var(--shadow-ink); }
  .op-btn:active { transform: translate(1px,1px);   box-shadow: 1px 1px 0 var(--shadow-ink); }
  .op-btn.active { background: var(--purple); color: #fff; }

  /* ---------- Problem display ---------- */
  .problem {
    font-family: 'Patrick Hand', cursive;
    font-size: 4.2rem;
    color: var(--ink);
    margin: 18px 0 16px;
    letter-spacing: 4px;
    min-height: 5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }

  /* ---------- Answer input ---------- */
  .input-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 14px;
    margin-bottom: 18px;
  }
  #answer {
    font-family: 'Patrick Hand', cursive;
    font-size: 2.6rem;
    font-weight: 400;
    width: 150px;
    text-align: center;
    padding: 6px 10px 4px;
    color: var(--blue);
    background: transparent;
    border: none;
    border-bottom: 3.5px dashed var(--ink);
    border-radius: 0;
    outline: none;
    letter-spacing: 2px;
    transition: border-color 0.2s, color 0.2s;
  }
  #answer:focus { border-bottom-color: var(--red); }

  .btn-check {
    font-family: 'Patrick Hand', cursive;
    font-size: 1.6rem;
    padding: 10px 28px 8px;
    border: 2.5px solid var(--ink);
    border-radius: 14px;
    background: var(--blue);
    color: #fff;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 1px;
    box-shadow: 4px 4px 0 var(--shadow-ink);
  }
  .btn-check:hover  { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 var(--shadow-ink); }
  .btn-check:active { transform: translate(2px,2px);   box-shadow: 1px 1px 0 var(--shadow-ink); }

  /* ---------- True / False buttons ---------- */
  .tf-row {
    display: flex;
    justify-content: center;
    gap: 18px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .tf-btn {
    font-family: 'Patrick Hand', cursive;
    font-size: 1.7rem;
    padding: 14px 30px 12px;
    border: 2.5px solid var(--ink);
    border-radius: 16px;
    color: #fff;
    cursor: pointer;
    min-width: 150px;
    transition: all 0.15s;
    box-shadow: 5px 5px 0 var(--shadow-ink);
    letter-spacing: 1px;
  }
  .tf-true  { background: var(--green); transform: rotate(-1.5deg); }
  .tf-false { background: var(--red);   transform: rotate(1.5deg); }
  .tf-btn:hover  { transform: translate(-2px,-2px) rotate(0); box-shadow: 7px 7px 0 var(--shadow-ink); }
  .tf-btn:active { transform: translate(2px,2px);  box-shadow: 2px 2px 0 var(--shadow-ink); }

  /* ---------- Feedback + stars ---------- */
  .feedback {
    font-family: 'Patrick Hand', cursive;
    font-size: 1.7rem;
    min-height: 2.2rem;
    margin-bottom: 6px;
    letter-spacing: 0.5px;
  }
  .feedback.correct-text { color: var(--green); animation: pop 0.35s ease; }
  .feedback.wrong-text   { color: var(--red);   animation: pop 0.35s ease; }
  @keyframes pop {
    0%   { transform: scale(0.7) rotate(-4deg); opacity: 0; }
    60%  { transform: scale(1.1) rotate(2deg);  opacity: 1; }
    100% { transform: scale(1) rotate(0); }
  }
  .stars {
    font-size: 1.6rem;
    min-height: 1.8rem;
    margin-bottom: 4px;
    letter-spacing: 3px;
    filter: drop-shadow(1px 1px 0 rgba(167, 128, 26, 0.6));
  }

  /* ---------- Number pad ---------- */
  .numpad {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 7px;
    margin-top: 14px;
  }
  .numpad button {
    font-family: 'Patrick Hand', cursive;
    font-size: 1.6rem;
    padding: 12px 0 10px;
    border: 2.2px solid var(--ink);
    border-radius: 10px;
    background: #fffef7;
    color: var(--ink);
    cursor: pointer;
    transition: all 0.12s;
    box-shadow: 3px 3px 0 var(--shadow-ink);
  }
  .numpad button:hover  { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--shadow-ink); background: #fffbe8; }
  .numpad button:active { transform: translate(2px,2px);   box-shadow: 1px 1px 0 var(--shadow-ink); }
  .numpad .wide { grid-column: span 2; background: var(--yellow); }
  .numpad button[data-val="back"] { background: #fdeada; }
  .numpad button[data-val="clear"] { background: #fbe0ee; }
  .numpad button[data-val="neg"]   { background: #e8f2ff; }

  /* ---------- Challenge setup / Results ---------- */
  .setup-section { margin-bottom: 18px; width: 100%; }
  .setup-label {
    font-family: 'Patrick Hand', cursive;
    font-size: 1.3rem;
    color: var(--ink);
    margin-bottom: 8px;
  }
  .btn-start {
    margin-top: 14px;
    font-family: 'Patrick Hand', cursive;
    font-size: 2rem;
    padding: 14px 52px 12px;
    border: 3px solid var(--ink);
    border-radius: 18px;
    background: var(--green);
    color: #fff;
    cursor: pointer;
    letter-spacing: 3px;
    transition: all 0.15s;
    box-shadow: 6px 6px 0 var(--shadow-ink);
    transform: rotate(-1.2deg);
  }
  .btn-start:hover  { transform: translate(-2px,-2px) rotate(0); box-shadow: 8px 8px 0 var(--shadow-ink); }
  .btn-start:active { transform: translate(3px,3px) rotate(0); box-shadow: 2px 2px 0 var(--shadow-ink); }

  .results-stats { width: 100%; margin-bottom: 16px; }
  .result-row {
    font-family: 'Patrick Hand', cursive;
    font-size: 1.55rem;
    padding: 6px 0;
    color: var(--ink);
  }
  .result-row.correct-text { color: var(--green); }
  .result-row.wrong-text   { color: var(--red); }

  /* ---------- Timer ---------- */
  .timer-bar { margin-bottom: 10px; }
  .timer-display {
    font-family: 'Patrick Hand', cursive;
    font-size: 2.2rem;
    color: var(--orange);
    background: #fffbe8;
    padding: 2px 16px;
    border: 2.2px solid var(--ink);
    border-radius: 10px;
    box-shadow: 3px 3px 0 var(--shadow-ink);
    display: inline-block;
  }
  .timer-display.urgent {
    color: var(--red);
    animation: pulse 0.5s infinite alternate;
  }
  @keyframes pulse { to { transform: scale(1.08); } }

  /* ---------- About button & modal ---------- */
  .about-btn {
    position: absolute;
    top: 10px;
    right: 14px;
    background: none;
    border: none;
    font-size: 1.3rem;
    cursor: pointer;
    opacity: 0.55;
    transition: opacity 0.2s, transform 0.2s;
  }
  .about-btn:hover { opacity: 1; transform: rotate(15deg); }

  .about-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(42, 37, 30, 0.55);
    z-index: 100;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .about-overlay.visible { display: flex; pointer-events: auto; }
  .about-box {
    background: #fffef7;
    border: 2.5px solid var(--ink);
    border-radius: 10px;
    padding: 28px 32px;
    max-width: 360px;
    width: 88%;
    text-align: center;
    box-shadow: 7px 8px 0 var(--shadow-ink);
    transform: rotate(-1deg);
  }
  .about-box h2 {
    font-family: 'Patrick Hand', cursive;
    font-size: 1.8rem;
    margin-bottom: 14px;
    color: var(--ink);
  }
  .about-box p {
    font-family: 'Patrick Hand', cursive;
    margin: 8px 0;
    font-size: 1.25rem;
    color: var(--ink);
  }
  .about-box a {
    color: var(--blue);
    text-decoration: none;
    border-bottom: 2px dashed var(--blue);
    padding-bottom: 1px;
  }
  .about-box a:hover { color: var(--red); border-bottom-color: var(--red); }
  .about-close {
    margin-top: 16px;
    font-family: 'Patrick Hand', cursive;
    padding: 6px 28px 4px;
    border: 2.2px solid var(--ink);
    border-radius: 14px;
    background: var(--yellow);
    font-size: 1.2rem;
    color: var(--ink);
    cursor: pointer;
    box-shadow: 3px 3px 0 var(--shadow-ink);
    transition: all 0.15s;
  }
  .about-close:hover  { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--shadow-ink); }
  .about-close:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--shadow-ink); }

  /* ---------- Small / short screens ---------- */
  @media (max-width: 520px) {
    body { background-size: 100% 30px, 100% 100%; padding: 10px 8px; }
    body::before, body::after { width: 110px; height: 110px; opacity: 0.35; }
    body::before { top: 8px; left: 6px; }
    body::after  { bottom: 8px; right: 6px; }
    .card { padding: 28px 20px 24px; }
    .problem { font-size: 3.2rem; }
    .lang-options { grid-template-columns: repeat(2, 1fr); gap: 12px; }
  }
  @media (max-height: 750px) {
    .card { padding: 24px 24px 20px; }
    h1 { font-size: 2rem; margin-bottom: 12px; }
    .problem { font-size: 3rem; margin: 12px 0; min-height: 3.5rem; }
    #answer { font-size: 2rem; }
    .numpad button { font-size: 1.3rem; padding: 9px 0 7px; }
    .numpad { gap: 5px; margin-top: 10px; }
    .score-bar { margin-bottom: 14px; font-size: 1.1rem; }
    .mode-selector { margin-bottom: 10px; }
    .feedback { font-size: 1.3rem; min-height: 1.8rem; }
    .stars { font-size: 1.3rem; min-height: 1.5rem; }
    .input-row { margin-bottom: 12px; }
    .btn-start { font-size: 1.6rem; padding: 10px 38px 8px; }
  }
</style>
</head>
<body class="theme-default">

<div class="card" style="position:relative;">
  <button class="about-btn" id="aboutBtn" title="About">&#x2139;&#xFE0F;</button>

  <!-- ======== About overlay ======== -->
  <div class="about-overlay" id="aboutOverlay">
    <div class="about-box">
      <h2>Math Fun!</h2>
      <p>&copy; <a href="https://www.linkedin.com/in/alexeybass/" target="_blank" rel="noopener">Alexey Bass</a></p>
      <p><a href="https://github.com/alexey-bass/matma" target="_blank" rel="noopener">GitHub</a></p>
      <button class="about-close" id="aboutClose">OK</button>
    </div>
  </div>

  <!-- ======== Language picker ======== -->
  <div class="lang-screen" id="langScreen">
    <h1>Choose Language</h1>
    <div class="lang-options">
      <button class="lang-btn" data-lang="pl">
        <div class="lang-flag">&#x1F1F5;&#x1F1F1;</div>
        <span class="lang-name">Polski</span>
      </button>
      <button class="lang-btn" data-lang="en">
        <div class="lang-flag">&#x1F1EC;&#x1F1E7;</div>
        <span class="lang-name">English</span>
      </button>
    </div>
  </div>

  <!-- ======== Mode picker ======== -->
  <div class="mode-screen" id="modeScreen" style="display:none">
    <h1 id="modeTitle">Choose Mode</h1>
    <div class="lang-options">
      <button class="lang-btn" id="btnPractice" data-gmode="practice">
        <div class="lang-flag">&#x1F4DA;</div>

      <button class="lang-btn" id="btnMissing" data-gmode="missing">

  <!-- ======== Challenge setup ======== -->
  <div class="challenge-setup" id="challengeSetup" style="display:none">

    <div class="setup-section">
      <div class="setup-label" id="timerLabel">Timer</div>
      <div class="mode-selector">
        <button class="mode-btn" data-timer="120">2 min</button>
        <button class="mode-btn active" data-timer="300">5 min</button>
        <button class="mode-btn" data-timer="600">10 min</button>
      </div>
    </div>

    <div class="setup-section">
      <div class="setup-label" id="difficultyLabel">Difficulty</div>
      <div class="mode-selector">
        <button class="mode-btn active" data-cmode="easy" id="cBtnEasy">Easy</button>
        <button class="mode-btn" data-cmode="medium" id="cBtnMedium">Medium</button>
        <button class="mode-btn" data-cmode="hard" id="cBtnHard">Hard</button>
      </div>
    </div>

    <div class="setup-section">
      <div class="setup-label" id="operationsLabel">Operations</div>
      <div class="settings-row">
        <button class="op-btn active" data-cop="+">+</button>
        <button class="op-btn active" data-cop="−">−</button>
        <button class="op-btn" data-cop="×">×</button>
        <button class="op-btn" data-cop="÷">÷</button>

    <button class="btn-start" id="btnStart">START</button>

  <!-- ======== Results screen ======== -->
  <div class="results-screen" id="resultsScreen" style="display:none">
    <h1 id="resultsTitle">Results</h1>
    <div class="results-stats">
      <div class="result-row correct-text">
        <span id="resCorrectLbl">Correct</span>: <span id="resCorrect">0</span>
      </div>
      <div class="result-row wrong-text">
        <span id="resWrongLbl">Wrong</span>: <span id="resWrong">0</span>
      </div>
      <div class="result-row">
        <span id="resTotalLbl">Total</span>: <span id="resTotal">0</span>
      </div>
      <div class="result-row">
        <span id="resAvgLbl">Avg time</span>: <span id="resAvg">0</span><span id="resAvgUnit">s</span>
      </div>

    <button class="btn-start" id="btnPlayAgain">Play Again</button>
  </div>

  <!-- ======== Game screen ======== -->
  <div class="game-screen" id="gameScreen">
    <h1 id="title">Math Fun!</h1>

    <div class="timer-bar" id="timerBar" style="display:none">
      <span class="timer-display" id="timerDisplay">5:00</span>
    </div>

    <div class="score-bar">
      <span><span id="totalLbl">Total</span>: <span class="total" id="totalVal">0</span></span>
      <span><span id="correctLbl">Correct</span>: <span class="correct" id="correctVal">0</span></span>
      <span><span id="wrongLbl">Wrong</span>: <span class="wrong" id="wrongVal">0</span></span>
      <span><span id="streakLbl">Streak</span>: <span class="streak" id="streakVal">0</span></span>
    </div>

    <div class="score-bar" id="progressBar" style="display:none">
      <span><span id="progressLbl">Progress</span>: <span id="progressVal">0 / 0</span></span>
    </div>

    <!-- Difficulty -->
    <div class="mode-selector" id="gameDifficulty">
      <button class="mode-btn active" data-mode="easy" id="btnEasy">Easy</button>
      <button class="mode-btn" data-mode="medium" id="btnMedium">Medium</button>
      <button class="mode-btn" data-mode="hard" id="btnHard">Hard</button>
    </div>

    <!-- Operations -->
    <div class="settings-row" id="gameOps">
      <button class="op-btn active" data-op="+">+</button>
      <button class="op-btn active" data-op="−">−</button>
      <button class="op-btn" data-op="×">×</button>
      <button class="op-btn" data-op="÷">÷</button>
    </div>

    <div class="problem" id="problem"></div>

    <div class="feedback" id="feedback"></div>
    <div class="stars" id="stars"></div>

    <div class="input-row" id="inputRow">
      <input id="answer" type="text" readonly autocomplete="off" />
      <button class="btn-check" id="checkBtn">GO</button>
    </div>

    <div class="tf-row" id="tfRow" style="display:none">
      <button class="tf-btn tf-true" id="tfTrueBtn">&#x2714; <span id="tfTrueLbl">True</span></button>
      <button class="tf-btn tf-false" id="tfFalseBtn">&#x2718; <span id="tfFalseLbl">False</span></button>
    </div>

    <!-- Number pad for tablets / phones -->
    <div class="numpad">
      <button data-val="1">1</button>
      <button data-val="2">2</button>
      <button data-val="3">3</button>
      <button data-val="4">4</button>
      <button data-val="5">5</button>
      <button data-val="6">6</button>
      <button data-val="7">7</button>
      <button data-val="8">8</button>
      <button data-val="9">9</button>
      <button data-val="0">0</button>
      <button data-val="back">&#9003;</button>
      <button class="wide" data-val="go">GO!</button>
      <button data-val="clear">C</button>
      <button data-val="neg">−</button>
    </div>
  </div>

</div>

<script type="module">
import { pick, shuffle, generateProblem, generateTableProblems, checkAnswer, generateMissingProblem, generateTrueFalseProblem, generateMakeProblem } from './math.js';

/* --- i18n --- */
const T = {
  en: {
    title: 'Math Fun!',
    streak: 'Streak',
    easy: 'Easy',
    medium: 'Medium',
    hard: 'Hard',
    praise: ['Awesome!', 'Great job!', 'You rock!', 'Super!', 'Fantastic!', 'Brilliant!', 'Nice one!', 'Wow!', 'Perfect!'],
    encourage: ['Almost!', 'Try again!', 'Keep going!', 'You can do it!', 'Not quite!', 'So close!'],
    wasAnswer: 'It was',
    chooseMode: 'Choose Mode',
    practice: 'Practice',
    challenge: 'Challenge',
    challengeTitle: 'Challenge Mode',
    timer: 'Timer',
    difficulty: 'Difficulty',
    operations: 'Operations',
    results: 'Results',
    correct: 'Correct',
    wrong: 'Wrong',
    total: 'Total',
    avgTime: 'Avg time',
    playAgain: 'Play Again',
    timesTables: 'Times Tables',
    missingNumber: 'Missing Number',
    trueOrFalse: 'True or False',
    numberBonds: 'Number Bonds',
    trueLbl: 'True',
    falseLbl: 'False',
    wasTrue: 'It was True.',
    wasFalse: 'It was False.',

    progress: 'Progress',
  },
  pl: {
    title: 'Matma!',
    streak: 'Seria',
    easy: 'Latwy',
    medium: 'Sredni',
    hard: 'Trudny',
    praise: ['Super!', 'Brawo!', 'Swietnie!', 'Tak trzymaj!', 'Fantastycznie!', 'Genialnie!', 'Wow!', 'Doskonale!', 'Rewelacja!'],
    encourage: ['Prawie!', 'Sprobuj jeszcze raz!', 'Nie poddawaj sie!', 'Dasz rade!', 'Niewiele brakuje!', 'Blisko!'],
    wasAnswer: 'Poprawna odpowiedz to',
    chooseMode: 'Wybierz tryb',
    practice: 'Cwiczenia',
    challenge: 'Wyzwanie',
    challengeTitle: 'Tryb wyzwania',
    timer: 'Czas',
    difficulty: 'Poziom',
    operations: 'Dzialania',
    results: 'Wyniki',
    correct: 'Poprawne',
    wrong: 'Bledne',
    total: 'Razem',
    avgTime: 'Sredni czas',
    playAgain: 'Zagraj ponownie',
    timesTables: 'Tabliczka mno\u017Cenia',
    missingNumber: 'Brakuj\u0105ca liczba',
    trueOrFalse: 'Prawda czy fa\u0142sz',
    numberBonds: 'Uzupe\u0142nij do',
    trueLbl: 'Prawda',
    falseLbl: 'Fa\u0142sz',
    wasTrue: 'To by\u0142a prawda.',
    wasFalse: 'To by\u0142 fa\u0142sz.',

    progress: 'Post\u0119p',
  },
};

let lang = 'en';

/* --- State --- */
let correctAnswer = 0;
let score = 0;
let wrongCount = 0;
let streak = 0;
let bestStreak = 0;
let mode = 'easy';
let ops = new Set(['+', '−']);
let gameMode = 'practice'; // 'practice' or 'challenge'
let challengeTimer = 300;  // seconds
let challengeOps = new Set(['+', '−']);
let timerInterval = null;
let timeRemaining = 0;
let problemStartTime = 0;
let totalSolveTime = 0;
let seenProblems = new Set();
let tableProblems = [];
let tableIndex = 0;

/* --- DOM refs --- */
const langScreen      = document.getElementById('langScreen');
const modeScreen      = document.getElementById('modeScreen');
const challengeSetup  = document.getElementById('challengeSetup');
const resultsScreen   = document.getElementById('resultsScreen');
const gameScreen      = document.getElementById('gameScreen');
const titleEl         = document.getElementById('title');
const totalLbl        = document.getElementById('totalLbl');
const correctLbl      = document.getElementById('correctLbl');
const wrongLbl        = document.getElementById('wrongLbl');
const streakLbl       = document.getElementById('streakLbl');
const btnEasy         = document.getElementById('btnEasy');
const btnMedium       = document.getElementById('btnMedium');
const btnHard         = document.getElementById('btnHard');
const problemEl       = document.getElementById('problem');
const feedbackEl      = document.getElementById('feedback');
const starsEl         = document.getElementById('stars');
const answerEl        = document.getElementById('answer');
const totalEl         = document.getElementById('totalVal');
const correctEl       = document.getElementById('correctVal');
const wrongEl         = document.getElementById('wrongVal');
const streakEl        = document.getElementById('streakVal');
const checkBtn        = document.getElementById('checkBtn');
const timerBar        = document.getElementById('timerBar');
const timerDisplay    = document.getElementById('timerDisplay');
const inputRow        = document.getElementById('inputRow');
const tfRow           = document.getElementById('tfRow');
const tfTrueBtn       = document.getElementById('tfTrueBtn');
const tfFalseBtn      = document.getElementById('tfFalseBtn');
const numpadEl        = document.querySelector('.numpad');

/* --- Helpers --- */
const t = () => T[lang];

function showScreen(screen) {
  [langScreen, modeScreen, challengeSetup, resultsScreen, gameScreen].forEach(s => s.style.display = 'none');
  screen.style.display = 'block';
  if (screen === modeScreen || screen === langScreen) screen.style.display = 'flex';
  if (screen === challengeSetup || screen === resultsScreen) screen.style.display = 'flex';
}

/* --- Language picker --- */
document.querySelectorAll('.lang-btn[data-lang]').forEach(btn => {
  btn.addEventListener('click', () => {
    lang = btn.dataset.lang;
    applyAllLang();
    showScreen(modeScreen);
  });
});

/* --- Mode picker --- */
document.getElementById('btnPractice').addEventListener('click', () => {
  gameMode = 'practice';
  startPractice();
});
document.getElementById('btnChallenge').addEventListener('click', () => {
  gameMode = 'challenge';
  showScreen(challengeSetup);
});
document.getElementById('btnTables').addEventListener('click', () => {
  gameMode = 'tables';
  tableProblems = shuffle(generateTableProblems([1, 2, 3, 4, 5, 6, 7, 8, 9]));
  tableIndex = 0;
  resetStats();
  showScreen(gameScreen);
  applyGameLang();
  document.getElementById('gameDifficulty').style.display = 'none';
  document.getElementById('gameOps').style.display = 'none';
  document.getElementById('progressBar').style.display = 'flex';
  timerBar.style.display = 'none';
  setInputMode('numpad');
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  newProblem();
});
document.getElementById('btnMissing').addEventListener('click', () => startSimpleMode('missing'));
document.getElementById('btnTrueFalse').addEventListener('click', () => startSimpleMode('truefalse'));
document.getElementById('btnMakeN').addEventListener('click', () => startSimpleMode('makeN'));

function startSimpleMode(m) {
  gameMode = m;
  timerBar.style.display = 'none';
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  document.getElementById('gameDifficulty').style.display = 'flex';
  // makeN uses + only by default; hide ops selector. Others show ops.
  document.getElementById('gameOps').style.display = (m === 'makeN') ? 'none' : 'flex';
  document.getElementById('progressBar').style.display = 'none';
  setInputMode(m === 'truefalse' ? 'tf' : 'numpad');
  showScreen(gameScreen);
  applyGameLang();
  resetStats();
  newProblem();
}

function setInputMode(kind) {
  if (kind === 'tf') {
    inputRow.style.display = 'none';
    if (numpadEl) numpadEl.style.display = 'none';
    tfRow.style.display = 'flex';
  } else {
    inputRow.style.display = 'flex';
    if (numpadEl) numpadEl.style.display = '';
    tfRow.style.display = 'none';
  }
}

function startPractice() {
  timerBar.style.display = 'none';
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  document.getElementById('gameDifficulty').style.display = 'flex';
  document.getElementById('gameOps').style.display = 'flex';
  document.getElementById('progressBar').style.display = 'none';
  setInputMode('numpad');
  showScreen(gameScreen);
  applyGameLang();
  resetStats();
  newProblem();
}

function resetStats() {
  score = 0;
  wrongCount = 0;
  streak = 0;
  bestStreak = 0;
  totalSolveTime = 0;
  totalEl.textContent = '0';
  correctEl.textContent = '0';
  wrongEl.textContent = '0';
  streakEl.textContent = '0';
  starsEl.textContent = '';
}

function applyAllLang() {
  // Mode screen
  document.getElementById('modeTitle').textContent = t().chooseMode;
  document.getElementById('practiceLabel').textContent = t().practice;
  document.getElementById('challengeLabel').textContent = t().challenge;

  // Challenge setup
  document.getElementById('challengeTitle').textContent = t().challengeTitle;
  document.getElementById('timerLabel').textContent = t().timer;
  document.getElementById('difficultyLabel').textContent = t().difficulty;
  document.getElementById('operationsLabel').textContent = t().operations;
  document.getElementById('cBtnEasy').textContent = t().easy;
  document.getElementById('cBtnMedium').textContent = t().medium;
  document.getElementById('cBtnHard').textContent = t().hard;

  // Tables & progress
  document.getElementById('tablesLabel').textContent = t().timesTables;
  document.getElementById('progressLbl').textContent = t().progress;

  // New modes
  document.getElementById('missingLabel').textContent = t().missingNumber;
  document.getElementById('trueFalseLabel').textContent = t().trueOrFalse;
  document.getElementById('makeNLabel').textContent = t().numberBonds;
  document.getElementById('tfTrueLbl').textContent = t().trueLbl;
  document.getElementById('tfFalseLbl').textContent = t().falseLbl;

  // Results screen
  document.getElementById('resultsTitle').textContent = t().results;
  document.getElementById('resCorrectLbl').textContent = t().correct;
  document.getElementById('resWrongLbl').textContent = t().wrong;
  document.getElementById('resTotalLbl').textContent = t().total;
  document.getElementById('resAvgLbl').textContent = t().avgTime;
  document.getElementById('btnPlayAgain').textContent = t().playAgain;

  applyGameLang();
}

function applyGameLang() {
  titleEl.textContent   = t().title;
  totalLbl.textContent   = t().total;
  correctLbl.textContent = t().correct;
  wrongLbl.textContent   = t().wrong;
  streakLbl.textContent = t().streak;
  btnEasy.textContent   = t().easy;
  btnMedium.textContent = t().medium;
  btnHard.textContent   = t().hard;
}

/* --- Challenge setup controls --- */
document.querySelectorAll('[data-timer]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-timer]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    challengeTimer = parseInt(btn.dataset.timer, 10);
  });
});

document.querySelectorAll('[data-cmode]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-cmode]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

document.querySelectorAll('[data-cop]').forEach(btn => {
  btn.addEventListener('click', () => {
    const op = btn.dataset.cop;
    if (challengeOps.has(op) && challengeOps.size > 1) challengeOps.delete(op);
    else challengeOps.add(op);
    document.querySelectorAll('[data-cop]').forEach(b => {
      b.classList.toggle('active', challengeOps.has(b.dataset.cop));
    });
  });
});

/* --- Start challenge --- */
document.getElementById('btnStart').addEventListener('click', () => {
  // Apply challenge settings to game
  const activeMode = document.querySelector('[data-cmode].active');
  mode = activeMode ? activeMode.dataset.cmode : 'easy';
  ops = new Set(challengeOps);

  // Sync game difficulty buttons
  document.querySelectorAll('.mode-btn[data-mode]').forEach(b => b.classList.remove('active'));
  const matchBtn = document.querySelector(`.mode-btn[data-mode="${mode}"]`);
  if (matchBtn) matchBtn.classList.add('active');

  // Sync game operation buttons
  document.querySelectorAll('.op-btn[data-op]').forEach(b => {
    b.classList.toggle('active', ops.has(b.dataset.op));
  });

  resetStats();
  showScreen(gameScreen);
  applyGameLang();
  document.getElementById('gameDifficulty').style.display = 'flex';
  document.getElementById('gameOps').style.display = 'flex';
  document.getElementById('progressBar').style.display = 'none';
  setInputMode('numpad');
  seenProblems = new Set();

  // Start timer
  timeRemaining = challengeTimer;
  timerBar.style.display = 'block';
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timeRemaining--;
    updateTimerDisplay();
    if (timeRemaining <= 0) {
      clearInterval(timerInterval);
      timerInterval = null;
      endChallenge();
    }
  }, 1000);

  newProblem();
});

function updateTimerDisplay() {
  const min = Math.floor(timeRemaining / 60);
  const sec = timeRemaining % 60;
  timerDisplay.textContent = `${min}:${sec.toString().padStart(2, '0')}`;
  timerDisplay.classList.toggle('urgent', timeRemaining <= 10);
}

function endChallenge() {
  showScreen(resultsScreen);
  document.body.className = 'theme-default';
  const totalAnswered = score + wrongCount;
  document.getElementById('resCorrect').textContent = score;
  document.getElementById('resWrong').textContent = wrongCount;
  document.getElementById('resTotal').textContent = totalAnswered;
  const avg = totalAnswered > 0 ? (totalSolveTime / totalAnswered / 1000).toFixed(1) : '0';
  document.getElementById('resAvg').textContent = avg;
  document.getElementById('resAvgUnit').textContent = 's';
}

/* --- Play again --- */
document.getElementById('btnPlayAgain').addEventListener('click', () => {
  showScreen(modeScreen);
});

/* --- Generate problem --- */
function newProblem() {
  if (gameMode === 'tables') {
    if (tableIndex >= tableProblems.length) {
      endChallenge();
      return;
    }
    const p = tableProblems[tableIndex];
    tableIndex++;
    correctAnswer = p.correctAnswer;
    problemEl.textContent = p.text;
    feedbackEl.textContent = '';
    feedbackEl.className = 'feedback';
    answerEl.value = '';
    document.body.className = 'theme-default';
    problemStartTime = Date.now();
    document.getElementById('progressVal').textContent = `${tableIndex} / ${tableProblems.length}`;
    answerEl.focus();
    return;
  }

  let p;
  if (gameMode === 'makeN') {
    p = generateMakeProblem(mode);
  } else {
    const activeOps = [...ops];
    if (activeOps.length === 0) { ops.add('+'); activeOps.push('+'); updateOpButtons(); }

    if (gameMode === 'missing') {
      p = generateMissingProblem(mode, activeOps);
    } else if (gameMode === 'truefalse') {
      p = generateTrueFalseProblem(mode, activeOps);
    } else {
      let attempts = 0;
      do {
        p = generateProblem(mode, activeOps);
        attempts++;
      } while (gameMode === 'challenge' && seenProblems.has(`${p.a} ${p.op} ${p.b}`) && attempts < 50);

      if (gameMode === 'challenge') {
        seenProblems.add(`${p.a} ${p.op} ${p.b}`);
      }
    }
  }

  correctAnswer = p.correctAnswer;
  problemEl.textContent = p.text;
  feedbackEl.textContent = '';
  feedbackEl.className = 'feedback';
  answerEl.value = '';
  document.body.className = 'theme-default';
  problemStartTime = Date.now();
  if (gameMode !== 'truefalse') answerEl.focus();
}

/* --- Check answer --- */
function check() {
  if (gameMode === 'challenge' && !timerInterval) return;
  if (gameMode === 'truefalse') return; // TF uses its own buttons
  const result = checkAnswer(answerEl.value, correctAnswer);
  if (result === null) return;
  const wrongMsg = `${pick(t().encourage)} ${t().wasAnswer} ${correctAnswer}.`;
  recordResult(result, wrongMsg);
}

function checkTrueFalse(userSaysTrue) {
  if (gameMode !== 'truefalse') return;
  if (gameMode === 'challenge' && !timerInterval) return;
  const result = userSaysTrue === correctAnswer;
  const wrongMsg = `${pick(t().encourage)} ${correctAnswer ? t().wasTrue : t().wasFalse}`;
  recordResult(result, wrongMsg);
}

function recordResult(result, wrongFeedback) {
  const solveTime = Date.now() - problemStartTime;
  totalSolveTime += solveTime;

  if (result) {
    score++;
    streak++;
    if (streak > bestStreak) bestStreak = streak;
    feedbackEl.textContent = pick(t().praise);
    feedbackEl.className = 'feedback correct-text';
    document.body.className = 'theme-correct';
    updateStars();
    setTimeout(newProblem, 900);
  } else {
    wrongCount++;
    streak = 0;
    feedbackEl.textContent = wrongFeedback;
    feedbackEl.className = 'feedback wrong-text';
    document.body.className = 'theme-wrong';
    updateStars();
    setTimeout(newProblem, 1800);
  }

  totalEl.textContent = score + wrongCount;
  correctEl.textContent = score;
  wrongEl.textContent = wrongCount;
  streakEl.textContent = streak;
}

tfTrueBtn.addEventListener('click', () => checkTrueFalse(true));
tfFalseBtn.addEventListener('click', () => checkTrueFalse(false));

function updateStars() {
  starsEl.textContent = streak > 0 ? Array(Math.min(streak, 10)).fill('\u2B50').join('') : '';
}

/* --- Difficulty buttons --- */
document.querySelectorAll('.mode-btn[data-mode]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn[data-mode]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
    newProblem();
  });
});

/* --- Operation toggle buttons --- */
function updateOpButtons() {
  document.querySelectorAll('.op-btn[data-op]').forEach(b => {
    b.classList.toggle('active', ops.has(b.dataset.op));
  });
}
document.querySelectorAll('.op-btn[data-op]').forEach(btn => {
  btn.addEventListener('click', () => {
    const op = btn.dataset.op;
    if (ops.has(op) && ops.size > 1) ops.delete(op);
    else ops.add(op);
    updateOpButtons();
    newProblem();
  });
});

/* --- Submit via button or Enter --- */
checkBtn.addEventListener('click', check);
answerEl.addEventListener('keydown', e => { if (e.key === 'Enter') check(); });

/* --- Numpad --- */
document.querySelectorAll('.numpad button').forEach(btn => {
  btn.addEventListener('click', () => {
    const v = btn.dataset.val;
    if (v === 'go') { check(); return; }
    if (v === 'clear') { answerEl.value = ''; answerEl.focus(); return; }
    if (v === 'back') { answerEl.value = answerEl.value.slice(0, -1); answerEl.focus(); return; }
    if (v === 'neg') {
      answerEl.value = answerEl.value.startsWith('-') ? answerEl.value.slice(1) : '-' + answerEl.value;
      answerEl.focus();
      return;
    }
    answerEl.value += v;
    answerEl.focus();
  });
});

/* --- About popup --- */
const aboutOverlay = document.getElementById('aboutOverlay');
document.getElementById('aboutBtn').addEventListener('click', () => aboutOverlay.classList.add('visible'));
document.getElementById('aboutClose').addEventListener('click', () => aboutOverlay.classList.remove('visible'));
aboutOverlay.addEventListener('click', e => { if (e.target === aboutOverlay) aboutOverlay.classList.remove('visible'); });
</script>
